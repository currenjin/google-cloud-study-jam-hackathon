<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <rect width="1080" height="1920" fill="#0a0f0a"/>
  <!-- CCTV 모니터 느낌: 초록 틴트 -->
  <rect x="40" y="300" width="1000" height="1300" rx="8" fill="#0f1f12"/>
  <ellipse cx="540" cy="1350" rx="420" ry="100" fill="#132615"/>
  <!-- 편의점 카운터 (부감) -->
  <rect x="340" y="1100" width="400" height="180" rx="12" fill="#1d3a22"/>
  <!-- 인형 셋 (부감, 초록 톤) -->
  <g stroke="#7aa87a" stroke-width="20" stroke-linecap="round" fill="none">
    <circle cx="380" cy="820" r="60" fill="#7aa87a" stroke="none"/>
    <line x1="380" y1="905" x2="380" y2="1080"/>
    <circle cx="620" cy="800" r="60" fill="#7aa87a" stroke="none"/>
    <line x1="620" y1="885" x2="620" y2="1060"/>
    <circle cx="800" cy="860" r="60" fill="#7aa87a" stroke="none"/>
    <line x1="800" y1="945" x2="800" y2="1100"/>
  </g>
  <rect x="330" y="890" width="100" height="36" rx="18" fill="#8a2f27"/>
  <rect x="575" y="900" width="90" height="130" rx="12" fill="#27506e"/>
  <rect x="755" y="960" width="90" height="130" rx="12" fill="#27506e"/>
  <!-- CCTV UI 오버레이 -->
  <text x="90" y="390" font-family="monospace" font-size="44" fill="#8dff8d">● REC</text>
  <text x="990" y="390" font-family="monospace" font-size="40" fill="#8dff8d" text-anchor="end">CAM 04</text>
  <text x="90" y="1560" font-family="monospace" font-size="40" fill="#8dff8d">2026-07-16 15:19:59</text>
  <!-- 스캔라인 -->
  <g fill="#000000" opacity="0.15">
    <rect x="40" y="500" width="1000" height="6"/>
    <rect x="40" y="700" width="1000" height="6"/>
    <rect x="40" y="900" width="1000" height="6"/>
    <rect x="40" y="1100" width="1000" height="6"/>
    <rect x="40" y="1300" width="1000" height="6"/>
  </g>
  <!-- 자막 -->
  <rect x="60" y="1640" width="960" height="180" rx="24" fill="#000000" opacity="0.7"/>
  <text x="540" y="1715" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">나레이션: 이 모든 것은,</text>
  <text x="540" y="1785" font-family="sans-serif" font-size="48" fill="#8dff8d" text-anchor="middle">편의점 CCTV에 찍히고 있었다.</text>
  <text x="540" y="170" font-family="sans-serif" font-size="44" fill="#5c7a5c" text-anchor="middle" letter-spacing="8">— 4화. 목격자 —</text>
</svg>
