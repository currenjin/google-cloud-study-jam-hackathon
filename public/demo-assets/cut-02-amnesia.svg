<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <radialGradient id="spot2" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#33291f"/>
      <stop offset="100%" stop-color="#0f0d0a"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#spot2)"/>
  <ellipse cx="540" cy="1450" rx="460" ry="120" fill="#1c1712"/>
  <!-- 병원 침대 -->
  <rect x="240" y="1200" width="600" height="60" rx="14" fill="#d8d3c8"/>
  <rect x="240" y="1260" width="600" height="120" rx="10" fill="#4a4038"/>
  <!-- 인형 A: 빨간 목도리, 머리에 손 -->
  <g stroke="#c89b6a" stroke-width="22" stroke-linecap="round" fill="none">
    <circle cx="540" cy="720" r="80" fill="#c89b6a" stroke="none"/>
    <line x1="540" y1="830" x2="540" y2="1120"/>
    <line x1="540" y1="900" x2="430" y2="760"/> <!-- 머리 짚는 팔 -->
    <line x1="540" y1="900" x2="660" y2="1000"/>
  </g>
  <rect x="475" y="815" width="130" height="44" rx="22" fill="#c0392b"/>
  <!-- 물음표들 -->
  <text x="330" y="560" font-family="serif" font-size="120" fill="#f5d76e" opacity="0.9">?</text>
  <text x="700" y="480" font-family="serif" font-size="90" fill="#f5d76e" opacity="0.6">?</text>
  <text x="600" y="600" font-family="serif" font-size="60" fill="#f5d76e" opacity="0.4">?</text>
  <!-- 자막 -->
  <rect x="60" y="1580" width="960" height="220" rx="24" fill="#000000" opacity="0.65"/>
  <text x="540" y="1665" font-family="sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">미나: "당신... 누구시죠?"</text>
  <text x="540" y="1745" font-family="sans-serif" font-size="48" fill="#cccccc" text-anchor="middle">나레이션: 그날, 3개월의 기억이 사라졌다.</text>
  <text x="540" y="150" font-family="sans-serif" font-size="44" fill="#8a7358" text-anchor="middle" letter-spacing="8">— 2화. 지워진 계약 —</text>
</svg>
